name: Request Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  request-review:
    name: Notify DevOps & Request Review
    runs-on: ubuntu-latest
    # Skip draft PRs — only request when actually ready
    if: github.event.pull_request.draft == false

    steps:
      - name: Request review from hiyokun-d
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Don't request review from yourself
            if (author === 'hiyokun-d') {
              console.log('PR author is hiyokun-d — skipping self-review request.');
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: ['hiyokun-d'],
            });

            console.log(`Review requested from hiyokun-d on PR #${pr.number}`);

      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const base = pr.base.ref;
            const filesChanged = pr.changed_files;
            const additions = pr.additions;
            const deletions = pr.deletions;

            const body = [
              '## Review Requested',
              '',
              `@hiyokun-d — a new PR is ready for your review.`,
              '',
              '| | |',
              '|---|---|',
              `| **Branch** | \`${branch}\` → \`${base}\` |`,
              `| **Files changed** | ${filesChanged} |`,
              `| **Lines** | +${additions} / -${deletions} |`,
              `| **Author** | @${pr.user.login} |`,
              '',
              '### Checklist for reviewer',
              '- [ ] Schema / Prisma models are correct',
              '- [ ] API routes follow `{ data, error, meta }` shape',
              '- [ ] No hardcoded secrets or credentials',
              '- [ ] Role-based access is enforced (middleware / API guards)',
              '- [ ] Biome lint and TypeScript checks pass (see CI)',
              '- [ ] No `any` types introduced without justification',
              '- [ ] New components extracted (no growing monolithic pages)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
