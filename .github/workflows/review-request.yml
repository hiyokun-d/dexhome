name: Request Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  request-review:
    name: Notify DevOps & Request Review
    runs-on: ubuntu-latest
    # ${{ }} wrapper required — bare expressions aren't evaluated in if: fields
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Request review from hiyokun-d
        # continue-on-error: true so the comment step still runs even when this
        # step throws (e.g. 422 Unprocessable Entity when author == reviewer,
        # or when the reviewer is already assigned)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;

            if (author === 'hiyokun-d') {
              console.log('PR author is hiyokun-d — skipping self-review request.');
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['hiyokun-d'],
            });

      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Re-fetch the PR so changed_files/additions/deletions are populated.
            // The `opened` event payload can have 0 for these before GitHub computes them.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const body = [
              '## Review Requested',
              '',
              `@hiyokun-d — a new PR is ready for your review.`,
              '',
              '| | |',
              '|---|---|',
              `| **Branch** | \`${pr.head.ref}\` → \`${pr.base.ref}\` |`,
              `| **Files changed** | ${pr.changed_files} |`,
              `| **Lines** | +${pr.additions} / -${pr.deletions} |`,
              `| **Author** | @${pr.user.login} |`,
              '',
              '### Checklist for reviewer',
              '- [ ] Schema / Prisma models are correct',
              '- [ ] API routes follow `{ data, error, meta }` shape',
              '- [ ] No hardcoded secrets or credentials',
              '- [ ] Role-based access is enforced (middleware / API guards)',
              '- [ ] Biome lint and build checks pass (see CI)',
              '- [ ] No `any` types introduced without justification',
              '- [ ] New components extracted (no growing monolithic pages)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
