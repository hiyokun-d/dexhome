name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Biome lint
        # --reporter=github emits inline PR annotations (file:line markers)
        # so reviewers see errors directly in the diff, not just in the log.
        run: npx biome lint --reporter=github src/

      - name: TypeScript type check
        run: npx tsc --noEmit
