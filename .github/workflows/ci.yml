name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma.config.ts (and Prisma 7 internals) resolve both DATABASE_URL
          # and DIRECT_URL at config-load time — both dummies required in CI
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dexhome"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dexhome"

      - name: Biome lint
        run: npm run lint

  build:
    name: Build (includes type check)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dexhome"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dexhome"

      - name: Build
        # next build runs tsc internally — no separate tsc --noEmit needed.
        # Standalone tsc fails in CI because next-env.d.ts doesn't exist
        # until Next.js itself generates it during the build.
        run: npm run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dexhome"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dexhome"
          NEXTAUTH_SECRET: "ci-build-secret"
          NEXTAUTH_URL: "http://localhost:3000"
