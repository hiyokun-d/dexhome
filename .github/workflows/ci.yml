name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  code-review:
    name: Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Biome lint
        # Lint only — formatter diffs are not enforced in CI.
        # --reporter=github emits inline PR annotations (file:line markers)
        # so reviewers see errors directly in the diff, not just in the log.
        # Run `npm run format` locally before committing to keep style clean.
        run: npx biome lint --reporter=github src/
